trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: "24.x"
  artifactName: "webapp"
  packageDir: "$(Build.ArtifactStagingDirectory)/package"
  packageZip: "$(Build.ArtifactStagingDirectory)/webapp.zip"
  azureServiceConnection: "azure-rm-examcooker-prod"
  appServiceName: "examcooker-2024"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: Default
        steps:
          - checkout: self
            clean: true

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run build
            displayName: Build app

          - script: npm prune --omit=dev
            displayName: Trim dev dependencies

          - script: |
              set -eux
              rm -rf "$(packageDir)"
              mkdir -p "$(packageDir)"
              rsync -a .next/ "$(packageDir)/.next/"
              rsync -a node_modules/ "$(packageDir)/node_modules/"
              mkdir -p "$(packageDir)/src/generated"
              rsync -a src/generated/ "$(packageDir)/src/generated/"
              cp package.json "$(packageDir)/package.json"
              cp next.config.ts "$(packageDir)/next.config.ts"
              cp startup.sh "$(packageDir)/startup.sh"

              if [ -d public ]; then
                rsync -a public/ "$(packageDir)/public/"
              fi

              if [ -f package-lock.json ]; then
                cp package-lock.json "$(packageDir)/package-lock.json"
              fi

              if [ -d prisma ]; then
                rsync -a prisma/ "$(packageDir)/prisma/"
              fi

              rm -rf "$(packageDir)/.next/cache"
            displayName: Package deployment payload

          - task: ArchiveFiles@2
            displayName: Archive deployment payload
            inputs:
              rootFolderOrFile: "$(packageDir)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(packageZip)"
              replaceExistingArchive: true

          - publish: "$(packageZip)"
            artifact: "$(artifactName)"
            displayName: Publish artifact

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        pool:
          name: Default
        environment: examcooker-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "$(artifactName)"

                - task: AzureWebApp@1
                  displayName: Deploy web app
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    appType: webAppLinux
                    appName: "$(appServiceName)"
                    package: "$(Pipeline.Workspace)/$(artifactName)/webapp.zip"
                    startUpCommand: "bash /home/site/wwwroot/startup.sh"
