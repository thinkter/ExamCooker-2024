name: Deploy ExamCooker to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-webapp-examcooker-2024
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: examcooker-2024
  NODE_VERSION: "24"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DEV_DATABASE: ${{ secrets.DEV_DATABASE }}
      EXAMCOOKER_API_KEY: ${{ secrets.EXAMCOOKER_API_KEY }}
      GA_ID: ${{ secrets.GA_ID }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_MICROSERVICE_URL: ${{ secrets.NEXT_PUBLIC_MICROSERVICE_URL }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_PROXY_PATH: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROXY_PATH }}
      NEXT_PUBLIC_POSTHOG_UI_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_UI_HOST }}
      NEXT_TELEMETRY_DISABLED: "1"
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune development dependencies
        run: npm prune --omit=dev

      - name: Remove build-only files
        run: rm -rf .git .github .next/cache

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
